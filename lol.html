<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L4OS - Ultimate Reset Edition</title>
    <style>
        :root { 
            --tail-blue: #00c3ff; --l4-gold: #ffd700; --lvl50: #e67e22; 
            --glass: rgba(255, 255, 255, 0.1); --matrix: #00ff41;
        }
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }

        .tablet { width: 980px; height: 680px; background: #1a1a1a; border-radius: 50px; padding: 12px; position: relative; border: 4px solid #333; }
        .screen { width: 100%; height: 100%; background: #0b0b0b; border-radius: 40px; overflow: hidden; position: relative; display: flex; flex-direction: column; }

        /* UI COMPONENTS */
        .sw-status { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .game-gallery { flex: 1; display: flex; align-items: center; padding: 0 40px; gap: 20px; }
        .game-card { min-width: 180px; height: 180px; background: #222; border-radius: 10px; border: 3px solid transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 40px; }
        
        /* DOCK */
        .sw-dock { height: 100px; border-top: 1px solid #222; display: flex; justify-content: center; align-items: center; gap: 30px; }
        .sw-icon { width: 50px; height: 50px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .sw-icon:hover { background: #333; transform: scale(1.1); }

        /* REBOOT LAYERS */
        .overlay { position: absolute; inset: 0; background: black; z-index: 30000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #matrix-screen { color: var(--matrix); font-family: 'Courier New', monospace; padding: 20px; overflow: hidden; font-size: 14px; text-align: left; align-items: flex-start; }
        
        .loading-bar-container { width: 300px; height: 6px; background: #222; border-radius: 3px; margin-top: 20px; overflow: hidden; }
        .loading-bar-fill { width: 0%; height: 100%; background: var(--tail-blue); transition: linear; }

        /* HARDWARE */
        .badge-scanner { position: absolute; right: -90px; top: 220px; width: 80px; height: 180px; background: #222; border-radius: 0 20px 20px 0; border: 2px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: space-around; cursor: pointer; }
        .led { width: 16px; height: 16px; background: #300; border-radius: 50%; }
        .card { position: absolute; right: -250px; width: 110px; height: 150px; border-radius: 12px; transition: 0.8s; z-index: 10000; padding: 15px; color: black; font-weight: bold; }
        
        /* ANIMATIONS */
        @keyframes flash-r { 50% { background: #f00; box-shadow: 0 0 10px #f00; } }
        .led-red { animation: flash-r 0.5s infinite; }
    </style>
</head>
<body>

    <div class="tablet">
        <div class="screen" id="main-ui">
            <div id="reboot-logo-layer" class="overlay">
                <div style="width:80px; height:80px; border:4px solid var(--tail-blue); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:40px; color:var(--tail-blue); margin-bottom: 20px;">T</div>
                <h2 style="letter-spacing: 5px;">REBOOTING...</h2>
            </div>

            <div id="blackout-layer" class="overlay"></div>

            <div id="matrix-screen" class="overlay"></div>

            <div id="final-boot-layer" class="overlay">
                <div style="width:60px; height:60px; border:3px solid white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:30px; margin-bottom: 20px;">L4</div>
                <div class="loading-bar-container"><div id="boot-progress" class="loading-bar-fill"></div></div>
            </div>

            <div class="sw-status">
                <div style="font-weight:bold; color:var(--tail-blue);">TailOS Pro v10.0</div>
                <div id="clock">12:00</div>
                <div>100% 🔋</div>
            </div>

            <div class="game-gallery">
                <div class="game-card">🌕<span>Tail-Moon</span></div>
                <div class="game-card">🌐<span>Browser</span></div>
                <div class="game-card" style="border: 2px dashed #444;">⚙️<span>Settings</span></div>
            </div>

            <div class="sw-dock">
                <div class="sw-icon" onclick="requestScan(100000, 'stability')">⚖️</div>
                <div class="sw-icon" onclick="requestScan(100000, 'reset')">🔄</div>
                <div class="sw-icon" onclick="requestScan(50, 'security')">🔒</div>
            </div>
        </div>

        <div class="badge-scanner" onclick="triggerScan()">
            <div id="led" class="led"></div>
            <div style="font-size:20px;">📶</div>
        </div>

        <div id="card" class="card">
            <div id="card-lvl" style="font-size:1.1rem;">LVL</div>
            <div style="margin-top:80px; font-size:9px;">L4-OS SYSTEM</div>
        </div>
    </div>

    <script>
        let pLvl = 0; let pTask = "";
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playPiano() {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(80, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.8);
        }

        function requestScan(lvl, task) {
            pLvl = lvl; pTask = task;
            document.getElementById('led').className = 'led led-red';
        }

        function triggerScan() {
            if(pLvl === 0) return;
            const led = document.getElementById('led');
            const card = document.getElementById('card');
            
            led.className = 'led'; led.style.background = '#f90';
            card.style.background = (pLvl === 50) ? 'var(--lvl50)' : 'var(--l4-gold)';
            document.getElementById('card-lvl').innerText = "LVL " + pLvl;
            card.style.right = "45px";

            setTimeout(() => {
                led.style.background = '#0f0'; playPiano();
                setTimeout(() => {
                    card.style.right = "-250px"; led.style.background = '#300';
                    if(pTask === 'reset') startReset();
                    if(pTask === 'stability') alert("System Stable.");
                    pLvl = 0;
                }, 800);
            }, 1200);
        }

        function startReset() {
            // 1. Reboot Logo (3s)
            const layer1 = document.getElementById('reboot-logo-layer');
            layer1.style.display = 'flex';
            
            setTimeout(() => {
                layer1.style.display = 'none';
                // 2. Blackout (3s)
                const layer2 = document.getElementById('blackout-layer');
                layer2.style.display = 'flex';
                
                setTimeout(() => {
                    layer2.style.display = 'none';
                    // 3. Matrix Script (5s)
                    const layer3 = document.getElementById('matrix-screen');
                    layer3.style.display = 'flex';
                    let lines = 0;
                    const matrixInt = setInterval(() => {
                        layer3.innerHTML += `> DEPLOYING_KERNEL_0x${Math.random().toString(16).substr(2,6).toUpperCase()}... [OK]<br>`;
                        layer3.scrollTop = layer3.scrollHeight;
                        lines++;
                        if(lines > 25) {
                            clearInterval(matrixInt);
                            layer3.style.display = 'none';
                            // 4. Final Boot (5s)
                            const layer4 = document.getElementById('final-boot-layer');
                            layer4.style.display = 'flex';
                            const bar = document.getElementById('boot-progress');
                            let p = 0;
                            const bootInt = setInterval(() => {
                                p += 2; bar.style.width = p + '%';
                                if(p >= 100) {
                                    clearInterval(bootInt);
                                    layer4.style.display = 'none';
                                    bar.style.width = '0%';
                                }
                            }, 100);
                        }
                    }, 200);
                }, 3000);
            }, 3000);
        }

        function updateClock() {
            const d = new Date();
            document.getElementById('clock').innerText = d.getHours() + ":" + String(d.getMinutes()).padStart(2, '0');
        }
        setInterval(updateClock, 1000);
    </script>
</body>
</html>

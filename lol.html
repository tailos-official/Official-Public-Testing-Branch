<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L4OS Pro - Crash & Boot Master</title>
    <style>
        :root { 
            --tail-blue: #00c3ff; --l4-gold: #ffd700; --lvl50: #e67e22; 
            --matrix: #00ff41; --danger: #ff4444; --bsod-blue: #0078d7;
        }
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }

        .tablet { width: 980px; height: 680px; background: #1a1a1a; border-radius: 50px; padding: 12px; position: relative; border: 4px solid #333; }
        .screen { width: 100%; height: 100%; background: #0b0b0b; border-radius: 40px; overflow: hidden; position: relative; display: flex; flex-direction: column; }

        /* UI ELEMENTS */
        .sw-status { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .game-gallery { flex: 1; display: flex; align-items: center; padding: 0 40px; gap: 20px; }
        .game-card { min-width: 180px; height: 180px; background: #111; border-radius: 12px; border: 2px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 45px; }
        
        /* DOCK */
        .sw-dock { height: 110px; border-top: 1px solid #222; display: flex; justify-content: center; align-items: center; gap: 20px; background: rgba(255,255,255,0.02); }
        .sw-icon { width: 60px; height: 60px; background: #222; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; transition: 0.3s; border: 1px solid #333; }
        .sw-icon:hover { transform: translateY(-10px); border-color: var(--tail-blue); }
        .sw-icon span { font-size: 8px; margin-top: 4px; font-weight: bold; color: #666; }

        /* OVERLAYS */
        .overlay { position: absolute; inset: 0; background: black; z-index: 30000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #matrix-screen { color: var(--matrix); font-family: 'Courier New', monospace; padding: 30px; overflow: hidden; font-size: 13px; text-align: left; align-items: flex-start; }
        .loading-bar-container { width: 320px; height: 4px; background: #222; border-radius: 2px; margin-top: 25px; overflow: hidden; }
        .loading-bar-fill { width: 0%; height: 100%; background: var(--tail-blue); }

        /* BSOD */
        #bsod-screen { background: var(--bsod-blue); color: white; z-index: 40000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 50px; text-align: left; }
        .bsod-content { width: 80%; }
        #bsod-screen h1 { font-size: 100px; margin: 0; font-weight: 300; }

        /* HARDWARE */
        .badge-scanner { position: absolute; right: -90px; top: 220px; width: 80px; height: 180px; background: #222; border-radius: 0 20px 20px 0; border: 2px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: space-around; cursor: pointer; z-index: 50000; }
        .led { width: 16px; height: 16px; background: #300; border-radius: 50%; }
        .card { position: absolute; right: -250px; width: 115px; height: 155px; border-radius: 12px; transition: 0.7s cubic-bezier(0.19, 1, 0.22, 1); z-index: 60000; padding: 15px; color: black; font-weight: bold; }
        @keyframes flash-red { 50% { background: #f00; box-shadow: 0 0 15px #f00; } }
        .led-red { animation: flash-red 0.5s infinite; }
    </style>
</head>
<body>

    <div class="tablet">
        <div class="screen">
            <div id="bsod-screen" class="overlay">
                <div class="bsod-content">
                    <h1>:(</h1>
                    <p style="font-size: 22px; margin: 20px 0;">Votre TailPad a détecté une erreur.<br>Récupération des données en cours...</p>
                    <p style="font-size: 22px;"><span id="bsod-perc">0</span>% complété</p>
                </div>
            </div>

            <div id="reboot-logo-layer" class="overlay">
                <div style="width:80px; height:80px; border:4px solid var(--tail-blue); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:40px; color:var(--tail-blue);">T</div>
                <h2 style="margin-top:20px;">SYSTEM RECOVERY</h2>
            </div>
            <div id="blackout-layer" class="overlay"></div>
            <div id="matrix-screen" class="overlay"></div>
            <div id="final-boot-layer" class="overlay">
                <div style="font-size:30px; font-weight:bold;">L4</div>
                <div class="loading-bar-container"><div id="boot-progress" class="loading-bar-fill"></div></div>
            </div>

            <div class="sw-status">
                <div style="font-weight:bold; color:var(--tail-blue);">TailOS Pro v10.0</div>
                <div id="clock">12:00</div>
                <div>100% 🔋</div>
            </div>

            <div class="game-gallery">
                <div class="game-card">🌕<span>Moon</span></div>
                <div class="game-card">🌐<span>Web</span></div>
                <div class="game-card" style="opacity: 0.2;">➕</div>
            </div>

            <div class="sw-dock">
                <div class="sw-icon" onclick="requestScan(100000, 'reset')">🔄<span>RESET</span></div>
                <div class="sw-icon" onclick="requestScan(100000, 'crash-test')" style="color: var(--danger);">💥<span>CRASH</span></div>
                <div class="sw-icon" onclick="requestScan(50, 'security')">🔒<span>ADMIN</span></div>
            </div>
        </div>

        <div class="badge-scanner" onclick="triggerScan()">
            <div id="led" class="led"></div>
            <div style="font-size:18px;">📶</div>
        </div>

        <div id="card" class="card">
            <div id="card-lvl" style="font-size:1.1rem;">LVL</div>
            <div style="margin-top:85px; font-size:9px;">SYSTEM CARD</div>
        </div>
    </div>

    <script>
        let pLvl = 0; let pTask = "";
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playBeep(f, d) {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(f, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + d);
        }

        function requestScan(lvl, task) {
            pLvl = lvl; pTask = task;
            document.getElementById('led').className = 'led led-red';
        }

        function triggerScan() {
            if (pLvl === 0) return;
            const led = document.getElementById('led');
            const card = document.getElementById('card');
            led.className = 'led'; led.style.background = '#f90';
            card.style.background = (pLvl === 50) ? 'var(--lvl50)' : 'var(--l4-gold)';
            document.getElementById('card-lvl').innerText = "LVL " + pLvl;
            card.style.right = "45px";

            setTimeout(() => {
                led.style.background = '#0f0'; playBeep(80, 0.8);
                setTimeout(() => {
                    card.style.right = "-250px"; led.style.background = '#300';
                    if(pTask === 'crash-test') runCrashSequence();
                    if(pTask === 'reset') startReboot(false);
                    pLvl = 0;
                }, 800);
            }, 1200);
        }

        function runCrashSequence() {
            // 1. BSOD (0 to 100% at 25%/sec = 4 seconds)
            document.getElementById('bsod-screen').style.display = 'flex';
            let p = 0;
            const bsodInt = setInterval(() => {
                p += 5; 
                document.getElementById('bsod-perc').innerText = p;
                if(p >= 100) {
                    clearInterval(bsodInt);
                    setTimeout(() => startReboot(true), 1000);
                }
            }, 200); // 200ms * 5 = 1000ms = 25%
        }

        function startReboot(isFromCrash) {
            document.getElementById('bsod-screen').style.display = 'none';
            // 2. Blackout (3s)
            showLayer('blackout-layer');
            setTimeout(() => {
                // 3. Matrix (5s)
                showLayer('matrix-screen');
                let lines = 0;
                const mInt = setInterval(() => {
                    document.getElementById('matrix-screen').innerHTML += `> DEPLOY_FIX_0x${Math.random().toString(16).substr(2,4).toUpperCase()}...<br>`;
                    lines++;
                    if(lines > 25) {
                        clearInterval(mInt);
                        // 4. Final Boot (5s)
                        showLayer('final-boot-layer');
                        let progress = 0;
                        const bootBar = document.getElementById('boot-progress');
                        const bInt = setInterval(() => {
                            progress += 1; 
                            bootBar.style.width = progress + '%';
                            if(progress >= 100) {
                                clearInterval(bInt);
                                playBeep(440, 0.3); setTimeout(()=>playBeep(880, 0.5), 150);
                                setTimeout(() => { hideAllLayers(); }, 500);
                            }
                        }, 50); // 50ms * 100 = 5000ms (5 seconds)
                    }
                }, 200);
            }, 3000);
        }

        function showLayer(id) {
            hideAllLayers();
            document.getElementById(id).style.display = 'flex';
        }

        function hideAllLayers() {
            document.querySelectorAll('.overlay').forEach(l => l.style.display = 'none');
            document.getElementById('matrix-screen').innerHTML = "";
            document.getElementById('boot-progress').style.width = '0%';
        }

        setInterval(() => {
            const d = new Date();
            document.getElementById('clock').innerText = d.getHours() + ":" + String(d.getMinutes()).padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
